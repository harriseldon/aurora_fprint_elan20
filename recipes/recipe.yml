---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: aurora_fprint_elan
# description will be included in the image's metadata
description: A specialized version of Aurora dx that contains the elantech fprint drivers

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/aurora-dx
image-version: latest

# udpates to immutable base
modules:
  # - type: files
  #   files:
  #     - source: system
  #       destination: /

  - type: dnf
    repos:
      copr:
        - doncesar12345/libfprint-elanmoc2 
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:doncesar12345:libfprint-elanmoc2
        packages:
          - old: libfprint
            new: libfprint-elanmoc2
  - type: signing
